version: "3.9"

services:
  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voidfill-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - voice_uploads:/tmp/voidfill_voice
    restart: unless-stopped

  # ── PostgreSQL with pgvector ────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: voidfill-postgres
    environment:
      POSTGRES_USER: voidfill
      POSTGRES_PASSWORD: voidfill_secret
      POSTGRES_DB: voidfill
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voidfill -d voidfill"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voidfill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  voice_uploads:
