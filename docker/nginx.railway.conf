server {
    listen 80;
    server_name _;

    # ── Static React SPA ─────────────────────────────────────────────────────
    root /app/frontend/dist;
    index index.html;

    # Gzip for JS/CSS/JSON
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ── API proxy → uvicorn on 127.0.0.1:8000 ───────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts for voice upload + LLM calls
        proxy_read_timeout    300s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;

        # Allow large audio file uploads (25 MB)
        client_max_body_size 30m;
    }

    # ── Health check — proxied to FastAPI ────────────────────────────────────
    location /health {
        proxy_pass        http://127.0.0.1:8000;
        proxy_set_header  Host $host;
        access_log        off;
    }

    # ── Docs (FastAPI Swagger / Redoc) ───────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass        http://127.0.0.1:8000;
        proxy_set_header  Host $host;
    }

    # ── SPA fallback — React Router handles all non-file routes ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
